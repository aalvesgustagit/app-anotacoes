<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            <h1 class="mb-4 text-center">Minhas Notas</h1>

            <!-- Formulário para Criar uma Nova Nota -->
            <div class="card mb-4">
                <div class="card-body">
                    <form action="/criar" method="POST">
                        <div class="mb-3">
                            <label for="titulo" class="form-label">Título</label>
                            <input type="text" class="form-control" id="titulo" name="titulo" required>
                        </div>
                        <div class="mb-3">
                            <label for="conteudo" class="form-label">Conteúdo</label>
                            <textarea class="form-control" id="conteudo" name="conteudo" rows="2" required></textarea>
                        </div>
                        <!-- text-center adicionado aqui para centralizar o botão de salvar -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Salvar Nota</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Lista de Notas Existentes -->
            <div class="row">
                {% for nota in notas %}
                <div class="col-12 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">{{ nota.titulo }}</h5>
                            <p class="card-text">{{ nota.conteudo }}</p>
                            <!-- text-center adicionado aqui para centralizar os botões da nota -->
                            <div class="text-center">
                                <a href="/editar/{{ nota.id }}" class="btn btn-warning btn-sm">Editar</a>
                                <a href="/deletar/{{ nota.id }}" class="btn btn-danger btn-sm">Deletar</a>
                            </div>
                        </div>
                    </div>
                </div>
                {% else %}
                <p class="text-center">Nenhuma nota encontrada.</p>
                {% endfor %}
            </div>

        </div>
    </div>
</body>
</html>
