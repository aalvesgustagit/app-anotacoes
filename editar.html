<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Nota</title>
</head>
<body>
    <div class="container mt-5">
        <h1>Editar Nota</h1>

        <!-- Formulário de Edição com os dados atuais da nota -->
        <div class="card mt-4">
            <div class="card-body">
                <!-- Rota que envia os dados alterados para a função atualizar() no Flask -->
                <form action="/atualizar/{{ nota.id }}" method="POST">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título</label>
                        <!-- O campo já vem preenchido com o valor atual (nota.titulo) -->
                        <input type="text" class="form-control" id="titulo" name="titulo" value="{{ nota.titulo }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="conteudo" class="form-label">Conteúdo</label>
                        <!-- O campo já vem preenchido com o valor atual (nota.conteudo) -->
                        <textarea class="form-control" id="conteudo" name="conteudo" rows="3" required>{{ nota.conteudo }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Salvar Alterações</button>
                    <!-- Link para voltar para a página principal sem salvar -->
                    <a href="/" class="btn btn-secondary">Cancelar</a>  
                </form>
            </div>
        </div>
    </div>
</body>
</html>
